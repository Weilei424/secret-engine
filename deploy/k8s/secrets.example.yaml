apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: secret-engine
type: Opaque
stringData:
  POSTGRES_DB: secret_engine
  POSTGRES_USER: secret_engine
  POSTGRES_PASSWORD: REPLACE_WITH_STRONG_POSTGRES_PASSWORD
---
apiVersion: v1
kind: Secret
metadata:
  name: secret-engine-config
  namespace: secret-engine
type: Opaque
stringData:
  SECRET_ENGINE__DATABASE_URL: postgres://secret_engine:REPLACE_WITH_STRONG_POSTGRES_PASSWORD@postgres.secret-engine.svc.cluster.local:5432/secret_engine
  SECRET_ENGINE__MASTER_KEY: REPLACE_WITH_LONG_RANDOM_MASTER_KEY
